services:
  local_postgres:
    image: postgres:17-alpine
    restart: always
    container_name: local_postgres
    env_file:
      - ../.env
    ports:
      - "5432:5432"

  local_redis:
    image: redis:7.4.2-alpine
    restart: always
    container_name: local_redis
    env_file:
      - ../.env
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"
